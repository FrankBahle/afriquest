<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/png" href="/assets/images/logo.png" />
    <link rel="apple-touch-icon" href="/assets/images/logo.png" />
    <link rel="preload" as="image" href="/assets/images/logo.png" fetchpriority="high" />
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://api.deepseek.com" crossorigin />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>GRIT Lab Africa</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #fff8eb;
      }

      .instantLoadingScreen {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: radial-gradient(circle at top left, rgba(244, 210, 138, 0.45), transparent 38%), linear-gradient(135deg, #fff8eb 0%, #f6ebd1 48%, #e3d2aa 100%);
        box-sizing: border-box;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .instantLoadingCard {
        width: min(360px, 100%);
        padding: 28px 24px;
        border-radius: 28px;
        text-align: center;
        background: rgba(255, 255, 255, 0.74);
        border: 1px solid rgba(139, 92, 40, 0.16);
        box-shadow: 0 22px 54px rgba(80, 52, 20, 0.14);
      }

      .instantLoadingCard img {
        width: 76px;
        height: 76px;
        object-fit: contain;
        margin-bottom: 14px;
      }

      .instantLoadingCard strong {
        display: block;
        color: #5c3512;
        font-size: 1.65rem;
        line-height: 1;
      }

      .instantLoadingCard span {
        display: block;
        margin-top: 10px;
        color: rgba(92, 53, 18, 0.72);
        font-size: 0.95rem;
        font-weight: 700;
      }

      .instantLoadingBar {
        height: 7px;
        margin-top: 20px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(139, 92, 40, 0.14);
      }

      .instantLoadingBar::after {
        content: "";
        display: block;
        width: 44%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #9a6a22, #d4af37, #5c3512);
        animation: instantLoad 1.05s ease-in-out infinite;
      }

      @keyframes instantLoad {
        from { transform: translateX(-110%); }
        to { transform: translateX(250%); }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div class="instantLoadingScreen">
        <div class="instantLoadingCard">
          <img src="/assets/images/logo.png" alt="GRIT Lab Africa logo" />
          <strong>GRIT Lab Africa</strong>
          <span>Opening your learning journey...</span>
          <div class="instantLoadingBar"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
